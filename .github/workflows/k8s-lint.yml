name: K8s Manifests Lint
on:
  push:
    branches: [main, develop]
    paths: ['k8s/**']
  pull_request:
    branches: [main]
    paths: ['k8s/**']

jobs:
  kubeconform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: yokawasa/action-setup-kube-tools@v0.13.3
        with:
          setup-tools: |
            kustomize
            kubeconform
          kustomize: '5.7.1'
          kubeconform: '0.7.0'

      - name: Validate manifests
        run: kustomize build k8s/ | kubeconform -strict -summary
