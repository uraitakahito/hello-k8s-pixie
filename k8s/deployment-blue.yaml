apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
      variant: blue
  template:
    metadata:
      labels:
        app: web
        variant: blue
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: web-server
          image: hello-k8s-pixie-web
          imagePullPolicy: Never
          env:
            - name: VARIANT
              value: "blue"
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 1
            periodSeconds: 5
