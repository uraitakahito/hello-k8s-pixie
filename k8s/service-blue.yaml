apiVersion: v1
kind: Service
metadata:
  # OrbStack: http://web-blue.hello-k8s-pixie.svc.cluster.local:8080
  name: web-blue
spec:
  # ClusterIP の機能に加え、ノード上のポート（30000–32767）を公開する
  # クラスタ外部から localhost:<nodePort> でアクセス可能になる
  type: NodePort
  selector:
    app: web
    variant: blue
  ports:
      # Service の ClusterIP が受け付けるポート（クラスタ内部からのアクセス用）
    - port: 8080
      # Pod（Nginx）が実際に listen しているポート
      targetPort: 80
      # ノード上で公開するポート（クラスタ外部から localhost:30080 でアクセス）
      nodePort: 30080
